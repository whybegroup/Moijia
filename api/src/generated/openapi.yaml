openapi: 3.0.0
components:
  examples: {}
  headers: {}
  parameters: {}
  requestBodies: {}
  responses: {}
  schemas:
    User:
      description: User model - represents a user in the system
      properties:
        id:
          type: string
          description: Unique user identifier
        name:
          type: string
          description: User's name
        displayName:
          type: string
          description: User's display name with location and year
        avatarSeed:
          type: string
          nullable: true
          description: DiceBear bottts seed for generated avatar
        thumbnail:
          type: string
          nullable: true
          description: Optional custom avatar image URL
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the user was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the user was last updated
      required:
        - id
        - name
        - displayName
        - createdAt
        - updatedAt
      type: object
      additionalProperties: false
    UserInput:
      description: Input for creating a new user
      properties:
        id:
          type: string
        name:
          type: string
        displayName:
          type: string
        avatarSeed:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
      required:
        - id
        - name
        - displayName
      type: object
      additionalProperties: false
    UserUpdate:
      description: Input for updating a user
      properties:
        name:
          type: string
        displayName:
          type: string
        avatarSeed:
          type: string
          nullable: true
        thumbnail:
          type: string
          nullable: true
      type: object
      additionalProperties: false
    Notification:
      description: Notification model
      properties:
        id:
          type: string
          description: Unique notification identifier
        type:
          type: string
          description: Notification type
        read:
          type: boolean
          description: Whether the notification has been read
        ts:
          type: string
          format: date-time
          description: Timestamp of the notification
        icon:
          type: string
          description: Icon identifier
        title:
          type: string
          description: Notification title
        body:
          type: string
          description: Notification body text
        groupId:
          type: string
          nullable: true
          description: Related group ID (if applicable)
        eventId:
          type: string
          nullable: true
          description: Related event ID (if applicable)
        navigable:
          type: boolean
          description: Whether this notification is navigable/clickable
        dest:
          type: string
          enum:
            - group
            - event
            - null
          nullable: true
          description: Navigation destination
        userId:
          type: string
          nullable: true
          description: User ID this notification is for
        createdAt:
          type: string
          format: date-time
          description: Timestamp when created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when updated
      required:
        - id
        - type
        - read
        - ts
        - icon
        - title
        - body
        - navigable
        - createdAt
        - updatedAt
      type: object
      additionalProperties: false
    NotificationInput:
      description: Input for creating a notification
      properties:
        id:
          type: string
        type:
          type: string
        read:
          type: boolean
        ts:
          anyOf:
            - type: string
              format: date-time
            - type: string
        icon:
          type: string
        title:
          type: string
        body:
          type: string
        groupId:
          type: string
        eventId:
          type: string
        navigable:
          type: boolean
        dest:
          type: string
          enum:
            - group
            - event
        userId:
          type: string
      required:
        - id
        - type
        - icon
        - title
        - body
      type: object
      additionalProperties: false
    MembershipStatus:
      type: string
      enum:
        - none
        - pending
        - member
        - admin
      description: User's relationship to a group - determines what info is returned
    GroupScoped:
      description: Group scoped by membership - API returns only appropriate fields
        per user's status
      properties:
        id:
          type: string
        name:
          type: string
        desc:
          type: string
        thumbnail:
          type: string
          nullable: true
        avatarSeed:
          type: string
          nullable: true
        isPublic:
          type: boolean
        memberCount:
          type: number
          format: double
        membershipStatus:
          $ref: "#/components/schemas/MembershipStatus"
        inviteCode:
          type: string
          nullable: true
          description: Present when member or admin
        superAdminId:
          type: string
        adminIds:
          items:
            type: string
          type: array
        memberIds:
          items:
            type: string
          type: array
        pendingMemberIds:
          items:
            type: string
          type: array
          description: Present when admin only
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when group is soft-deleted
        deletedBy:
          type: string
          nullable: true
      required:
        - id
        - name
        - desc
        - isPublic
        - memberCount
        - membershipStatus
      type: object
      additionalProperties: false
    Group:
      description: Group model - represents a social group (full, for members/admins)
      properties:
        id:
          type: string
          description: Unique group identifier
        name:
          type: string
          description: Group name
        desc:
          type: string
          description: Group description
        thumbnail:
          type: string
          nullable: true
          description: Group thumbnail/avatar URL
        avatarSeed:
          type: string
          nullable: true
          description: DiceBear icons seed for generated avatar
        inviteCode:
          type: string
          nullable: true
          description: Unique invite code for joining the group
        isPublic:
          type: boolean
          description: Whether the group is publicly visible
        superAdminId:
          type: string
          description: ID of the group's super admin
        adminIds:
          items:
            type: string
          type: array
          description: Array of admin user IDs
        memberIds:
          items:
            type: string
          type: array
          description: Array of member user IDs
        pendingMemberIds:
          items:
            type: string
          type: array
          description: Array of pending member request user IDs
        createdBy:
          type: string
          description: ID of the user who created this group
        updatedBy:
          type: string
          description: ID of the user who last updated this group
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the group was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the group was last updated
      required:
        - id
        - name
        - desc
        - isPublic
        - superAdminId
        - adminIds
        - memberIds
        - createdBy
        - updatedBy
        - createdAt
        - updatedAt
      type: object
      additionalProperties: false
    GroupInput:
      description: Input for creating a new group
      properties:
        id:
          type: string
        name:
          type: string
        desc:
          type: string
        thumbnail:
          type: string
          nullable: true
        avatarSeed:
          type: string
          nullable: true
        inviteCode:
          type: string
          nullable: true
        isPublic:
          type: boolean
        superAdminId:
          type: string
        adminIds:
          items:
            type: string
          type: array
        memberIds:
          items:
            type: string
          type: array
        createdBy:
          type: string
      required:
        - id
        - name
        - desc
        - isPublic
        - superAdminId
        - createdBy
      type: object
      additionalProperties: false
    GroupUpdate:
      description: Input for updating a group
      properties:
        name:
          type: string
        desc:
          type: string
        thumbnail:
          type: string
          nullable: true
        avatarSeed:
          type: string
          nullable: true
        isPublic:
          type: boolean
        superAdminId:
          type: string
        adminIds:
          items:
            type: string
          type: array
        memberIds:
          items:
            type: string
          type: array
        updatedBy:
          type: string
      required:
        - updatedBy
      type: object
      additionalProperties: false
    MembershipRequestAction:
      description: Membership request action
      properties:
        userId:
          type: string
          description: User ID of the member request
        action:
          type: string
          enum:
            - approve
            - reject
          description: "Action to take: approve or reject"
      required:
        - userId
        - action
      type: object
      additionalProperties: false
    Record_string.string_:
      properties: {}
      additionalProperties:
        type: string
      type: object
      description: Construct a type with a set of properties K of type T
    RSVP:
      description: RSVP model
      properties:
        userId:
          type: string
          description: User ID who made the RSVP
        status:
          type: string
          enum:
            - going
            - maybe
            - notGoing
            - waitlist
          description: RSVP status
        memo:
          type: string
          description: Optional memo or note
        createdAt:
          type: string
          format: date-time
          description: Timestamp when created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when updated
      required:
        - userId
        - status
        - memo
        - createdAt
        - updatedAt
      type: object
      additionalProperties: false
    Comment:
      description: Comment model
      properties:
        id:
          type: string
          description: Unique comment identifier
        userId:
          type: string
          description: ID of the user who made the comment
        text:
          type: string
          description: Comment text
        photos:
          items:
            type: string
          type: array
          description: Array of photo URLs attached to comment
        createdAt:
          type: string
          format: date-time
          description: Timestamp when created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when updated
      required:
        - id
        - userId
        - text
        - photos
        - createdAt
        - updatedAt
      type: object
      additionalProperties: false
    EventDetailed:
      description: Event with RSVPs and comments (detailed view)
      properties:
        id:
          type: string
          description: Unique event identifier
        groupId:
          type: string
          description: ID of the group this event belongs to
        createdBy:
          type: string
          description: ID of the user who created this event
        updatedBy:
          type: string
          description: ID of the user who last updated this event
        title:
          type: string
          description: Event title
        subtitle:
          type: string
          nullable: true
          description: Event subtitle
        description:
          type: string
          nullable: true
          description: Event description
        coverPhotos:
          items:
            type: string
          type: array
          description: Array of cover photo URLs
        start:
          type: string
          format: date-time
          description: Event start date/time
        end:
          type: string
          format: date-time
          description: Event end date/time
        isAllDay:
          type: boolean
          nullable: true
          description: Whether this is an all-day event
        location:
          type: string
          nullable: true
          description: Event location
        minAttendees:
          type: number
          format: double
          nullable: true
          description: Minimum number of attendees required
        maxAttendees:
          type: number
          format: double
          nullable: true
          description: Maximum number of attendees allowed
        enableWaitlist:
          type: boolean
          nullable: true
          description: Whether waitlist is enabled when max capacity is reached
        allowMaybe:
          type: boolean
          description: Whether 'maybe' RSVPs are allowed
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the event was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the event was last updated
        rsvps:
          items:
            $ref: "#/components/schemas/RSVP"
          type: array
          description: Array of RSVPs for this event
        comments:
          items:
            $ref: "#/components/schemas/Comment"
          type: array
          description: Array of comments on this event
      required:
        - id
        - groupId
        - createdBy
        - updatedBy
        - title
        - coverPhotos
        - start
        - end
        - allowMaybe
        - createdAt
        - updatedAt
        - rsvps
        - comments
      type: object
      additionalProperties: false
    Event:
      description: Event model - represents a scheduled event
      properties:
        id:
          type: string
          description: Unique event identifier
        groupId:
          type: string
          description: ID of the group this event belongs to
        createdBy:
          type: string
          description: ID of the user who created this event
        updatedBy:
          type: string
          description: ID of the user who last updated this event
        title:
          type: string
          description: Event title
        subtitle:
          type: string
          nullable: true
          description: Event subtitle
        description:
          type: string
          nullable: true
          description: Event description
        coverPhotos:
          items:
            type: string
          type: array
          description: Array of cover photo URLs
        start:
          type: string
          format: date-time
          description: Event start date/time
        end:
          type: string
          format: date-time
          description: Event end date/time
        isAllDay:
          type: boolean
          nullable: true
          description: Whether this is an all-day event
        location:
          type: string
          nullable: true
          description: Event location
        minAttendees:
          type: number
          format: double
          nullable: true
          description: Minimum number of attendees required
        maxAttendees:
          type: number
          format: double
          nullable: true
          description: Maximum number of attendees allowed
        enableWaitlist:
          type: boolean
          nullable: true
          description: Whether waitlist is enabled when max capacity is reached
        allowMaybe:
          type: boolean
          description: Whether 'maybe' RSVPs are allowed
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the event was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the event was last updated
      required:
        - id
        - groupId
        - createdBy
        - updatedBy
        - title
        - coverPhotos
        - start
        - end
        - allowMaybe
        - createdAt
        - updatedAt
      type: object
      additionalProperties: false
    EventInput:
      description: Input for creating a new event
      properties:
        id:
          type: string
        groupId:
          type: string
        createdBy:
          type: string
        title:
          type: string
        subtitle:
          type: string
        description:
          type: string
        coverPhotos:
          items:
            type: string
          type: array
        start:
          anyOf:
            - type: string
              format: date-time
            - type: string
        end:
          anyOf:
            - type: string
              format: date-time
            - type: string
        isAllDay:
          type: boolean
        location:
          type: string
        minAttendees:
          type: number
          format: double
        maxAttendees:
          type: number
          format: double
        enableWaitlist:
          type: boolean
        allowMaybe:
          type: boolean
      required:
        - id
        - groupId
        - createdBy
        - title
        - start
        - end
      type: object
      additionalProperties: false
    EventUpdate:
      description: Input for updating an event
      properties:
        title:
          type: string
        subtitle:
          type: string
        description:
          type: string
        coverPhotos:
          items:
            type: string
          type: array
        start:
          anyOf:
            - type: string
              format: date-time
            - type: string
        end:
          anyOf:
            - type: string
              format: date-time
            - type: string
        isAllDay:
          type: boolean
        location:
          type: string
        minAttendees:
          type: number
          format: double
        maxAttendees:
          type: number
          format: double
        enableWaitlist:
          type: boolean
        allowMaybe:
          type: boolean
        updatedBy:
          type: string
      required:
        - updatedBy
      type: object
      additionalProperties: false
    RSVPInput:
      description: Input for creating/updating an RSVP
      properties:
        userId:
          type: string
        status:
          type: string
          enum:
            - going
            - maybe
            - notGoing
            - waitlist
        memo:
          type: string
      required:
        - userId
        - status
      type: object
      additionalProperties: false
    CommentInput:
      description: Input for creating a comment
      properties:
        id:
          type: string
        userId:
          type: string
        text:
          type: string
        photos:
          items:
            type: string
          type: array
      required:
        - id
        - userId
      type: object
      additionalProperties: false
  securitySchemes: {}
info:
  title: BoltUp API
  version: 1.0.0
  description: REST API for BoltUp - A social event planning platform for groups
  license:
    name: ISC
  contact:
    name: BoltUp Team
paths:
  /users:
    get:
      operationId: GetUsers
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/User"
                type: array
      description: Get all users
      summary: Retrieves a list of all users in the system
      tags:
        - Users
      security: []
      parameters: []
    post:
      operationId: CreateUser
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
      description: Create a new user
      summary: Creates a new user in the system
      tags:
        - Users
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
  /users/{id}:
    get:
      operationId: GetUser
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
      description: Get user by ID
      summary: Retrieves a single user by their unique identifier
      tags:
        - Users
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    put:
      operationId: UpdateUser
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
      description: Update a user
      summary: Updates an existing user's information
      tags:
        - Users
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
    delete:
      operationId: DeleteUser
      responses:
        "204":
          description: No Content
      description: Delete a user
      summary: Deletes a user from the system
      tags:
        - Users
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
  /notifications:
    get:
      operationId: GetNotifications
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Notification"
                type: array
      description: Get all notifications
      summary: Retrieves notifications, optionally filtered by user
      tags:
        - Notifications
      security: []
      parameters:
        - in: query
          name: userId
          required: false
          schema:
            type: string
    post:
      operationId: CreateNotification
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
      description: Create a notification
      summary: Creates a new notification
      tags:
        - Notifications
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
  /notifications/{id}:
    get:
      operationId: GetNotification
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
      description: Get notification by ID
      summary: Retrieves a single notification
      tags:
        - Notifications
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
    put:
      operationId: UpdateNotification
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
      description: Update notification read status
      summary: Marks a notification as read or unread
      tags:
        - Notifications
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                read:
                  type: boolean
              required:
                - read
              type: object
    delete:
      operationId: DeleteNotification
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                required:
                  - success
                type: object
      description: Delete notification
      summary: Deletes a notification
      tags:
        - Notifications
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
  /notifications/unread-count/{userId}:
    get:
      operationId: GetUnreadCount
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                properties:
                  count:
                    type: number
                    format: double
                required:
                  - count
                type: object
      description: Get unread notification count
      summary: Gets count of unread notifications for a user
      tags:
        - Notifications
      security: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
  /notifications/mark-all-read/{userId}:
    put:
      operationId: MarkAllAsRead
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                properties:
                  success:
                    type: boolean
                required:
                  - success
                type: object
      description: Mark all as read
      summary: Marks all notifications as read for a user
      tags:
        - Notifications
      security: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
  /groups:
    get:
      operationId: GetGroups
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/GroupScoped"
                type: array
      description: Get all groups
      summary: Retrieves a list of groups with info scoped by user's membership
        status. Requires userId.
      tags:
        - Groups
      security: []
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
        - description: When true, includes soft-deleted groups where user is superadmin.
          in: query
          name: includeDeleted
          required: false
          schema:
            type: boolean
    post:
      operationId: CreateGroup
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
      description: Create a new group
      summary: Creates a new group with initial members
      tags:
        - Groups
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
  /groups/{id}:
    get:
      operationId: GetGroup
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupScoped"
      description: Get group by ID
      summary: Retrieves a single group with info scoped by user's membership status.
        Requires userId.
      tags:
        - Groups
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: userId
          required: true
          schema:
            type: string
    put:
      operationId: UpdateGroup
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupScoped"
      description: Update a group
      summary: Updates an existing group. Requires admin.
      tags:
        - Groups
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
    delete:
      operationId: DeleteGroup
